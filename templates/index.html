<!DOCTYPE html>
<html>
<head>
    <title>Docker Snippets</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Snippets Docker</h1>
    
    <form method="post" class="mb-4">
        <div class="row">
            <div class="col">
                <input type="text" name="command" class="form-control" placeholder="Comando Docker (ej: docker run -d -p 80:80 nginx)" required>
            </div>
            <div class="col">
                <input type="text" name="description" class="form-control" placeholder="Descripción breve" required>
            </div>
            <div class="col">
                <input type="text" name="tags" class="form-control" placeholder="Tags (network,volume,compose)">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Añadir</button>
            </div>
        </div>
    </form>
    
    <form method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="q" class="form-control" placeholder="Buscar..." value="{{ q }}">
            <button class="btn btn-outline-secondary">Buscar</button>
        </div>
    </form>
    
    <div class="list-group">
        {% for snippet in snippets %}
        <div class="list-group-item">
            <h5 class="mb-1"><code>{{ snippet.command }}</code></h5>
            <p class="mb-2">{{ snippet.description }}</p>
            <small class="text-muted">
                {% if snippet.tags %}{{ snippet.tags|join(', ') }}{% endif %}
                | {{ snippet.created[:10] }}
            </small>
            <a href="/snippet/{{ snippet.id }}" class="btn btn-sm btn-outline-primary float-end">Ver</a>
        </div>
        {% endfor %}
    </div>
    
    {% if not snippets %}
    <p class="text-muted">No hay snippets. ¡Añade el primero!</p>
    {% endif %}
</body>
</html>
