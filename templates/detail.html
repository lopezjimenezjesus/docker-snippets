<!DOCTYPE html>
<html>
<head>
    <title>Snippet {{ snippet.id }}</title>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <a href="/" class="btn btn-secondary mb-3">&larr; Volver</a>
    
    <div class="card">
        <div class="card-body">
            <h2 class="card-title"><code>{{ snippet.command }}</code></h2>
            <p class="card-text">{{ snippet.description }}</p>
            <p class="card-text"><strong>Tags:</strong> {{ snippet.tags|join(', ') }}</p>
            <p class="card-text"><small class="text-muted">Creado: {{ snippet.created }}</small></p>
        </div>
    </div>
</body>
</html>
